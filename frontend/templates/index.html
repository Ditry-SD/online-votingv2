<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн голосование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Фиксированное уведомление по центру экрана -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🗳️ Система онлайн голосования</span>
        <div>
            <a href="/results" class="btn btn-outline-light btn-sm">📊 Результаты</a>
            <button class="btn btn-outline-warning btn-sm ms-2" id="resetBtn" style="display:none" onclick="resetVotes()">🔄 Сброс</button>
            <span class="text-light ms-2" id="userInfo"></span>
            <button class="btn btn-outline-light btn-sm ms-2" id="authBtn" onclick="toggleAuth()">Войти</button>
        </div>
    </div>
</nav>

<!-- Модальное окно авторизации -->
<div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="authTitle">Вход</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="username" class="form-control mb-2" placeholder="Логин">
                <input type="password" id="password" class="form-control mb-2" placeholder="Пароль">
                <button class="btn btn-primary w-100" id="authSubmit" onclick="login()">Войти</button>
                <button class="btn btn-link w-100 mt-2" id="switchToRegister" onclick="switchAuth()">Регистрация</button>
                <div id="authError" class="text-danger mt-2" style="display:none"></div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5">
    <h1 class="text-center mb-4">Выберите кандидата</h1>
    <div class="row" id="candidates-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/voting.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
