name: Проверка приложения

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Установка Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Проверка импортов
      run: |
        python -c "from backend.database import engine, SessionLocal, Base; print('Импорты работают')"
    
    - name: Проверка создания таблиц
      run: |
        python -c "from backend.database import engine, Base; from backend import models; Base.metadata.create_all(bind=engine); print('Таблицы созданы')"
    
    - name: Проверка FastAPI приложения
      run: |
        python -c "from backend.main import app; print('FastAPI приложение загружено')"