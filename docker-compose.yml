services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./voting.db:/app/voting.db
      - ./test:/app/test
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/static:/app/frontend/static
    depends_on:
      - web